<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente de Coches - Buscador de Autos</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #fff !important;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .navbar-brand i {
            color: #ff6b35;
            font-size: 1.75rem;
        }
        
        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-link:hover {
            color: #ff6b35 !important;
        }
        
        .main-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }
        
        .hero-text {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .hero-text h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            background: linear-gradient(90deg, #fff, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-text p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }
        
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .search-input-group {
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 1.25rem 1.5rem 1.25rem 3.5rem;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: #fff;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.15);
        }
        
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.25rem;
        }
        
        .search-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 1rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }
        
        .search-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .response-card {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 2rem;
            display: none;
        }
        
        .response-card.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .response-content {
            line-height: 1.8;
            font-size: 1rem;
        }
        
        .response-content h2, 
        .response-content h3 {
            color: #fff;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        
        .response-content h2:first-child,
        .response-content h3:first-child {
            margin-top: 0;
        }
        
        .response-content p {
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 1rem;
        }
        
        .response-content ul, 
        .response-content ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }
        
        .response-content li {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
        }
        
        .response-content table {
            width: 100%;
            margin: 1rem 0;
            border-collapse: collapse;
        }
        
        .response-content th,
        .response-content td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .response-content th {
            color: #ff6b35;
            font-weight: 600;
        }
        
        .response-content td {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .response-content blockquote {
            background: rgba(255, 107, 53, 0.1);
            border-left: 4px solid #ff6b35;
            padding: 1rem 1.5rem;
            margin: 1rem 0;
            border-radius: 0 0.5rem 0.5rem 0;
        }
        
        .response-content blockquote p {
            margin: 0;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .response-content strong {
            color: #fff;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .suggestions {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .suggestions-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }
        
        .suggestion-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .suggestion-tag {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .suggestion-tag:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            padding: 2rem 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.875rem;
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 1rem;
            padding: 1.5rem;
            color: #f8d7da;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <i class="bi bi-car-front-fill"></i>
                <span>Agente Coches</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Hero -->
        <div class="hero-text">
            <h1>🏎️ Buscador de Coches</h1>
            <p>Encuentra precios, compara modelos y descubre el auto perfecto para ti</p>
        </div>
        
        <!-- Search Card -->
        <div class="search-card">
            <form id="searchForm">
                <div class="search-input-group">
                    <i class="bi bi-search search-icon"></i>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput"
                        placeholder="Ej: Cuánto cuesta el Toyota Corolla 2024? "
                        autocomplete="off"
                    >
                </div>
                <button type="submit" class="search-btn" id="searchBtn">
                    <i class="bi bi-search"></i>
                    <span>Buscar</span>
                </button>
            </form>
            
            <!-- Response -->
            <div class="response-card" id="responseCard">
                <div class="response-content" id="responseContent"></div>
            </div>
            
            <!-- Suggestions -->
            <div class="suggestions" id="suggestions">
                <div class="suggestions-title">Prueba preguntando:</div>
                <div class="suggestion-tags">
                    <span class="suggestion-tag" onclick="fillSearch('Cuánto cuesta el BMW X5?')">Cuánto cuesta el BMW X5?</span>
                    <span class="suggestion-tag" onclick="fillSearch('Precios del Toyota Corolla')">Precios del Toyota Corolla</span>
                    <span class="suggestion-tag" onclick="fillSearch('Compara Honda vs Toyota')">Compara Honda vs Toyota</span>
                    <span class="suggestion-tag" onclick="fillSearch('Dame precios de autos usados')">Precios de autos usados</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Agente de Coches v1.0 - Solo busco autos y precios</p>
    </footer>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const responseCard = document.getElementById('responseCard');
        const responseContent = document.getElementById('responseContent');

        // Fill search input
        function fillSearch(query) {
            searchInput.value = query;
            searchInput.focus();
        }

        // Handle form submit
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const query = searchInput.value.trim();
            if (!query) return;
            
            // Show loading
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<span class="loading-spinner"></span><span>Buscando...</span>';
            responseCard.classList.remove('show');
            
            try {
                const response = await fetch('/api/v1/analizar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        texto: query
                    }),
                });
                
                const data = await response.json();
                
                // Display response
                if (data.razonamiento) {
                    responseContent.innerHTML = formatResponse(data.razonamiento);
                } else if (data.error) {
                    responseContent.innerHTML = `<div class="error-message">${data.error}</div>`;
                }
                
                responseCard.classList.add('show');
                
            } catch (error) {
                responseContent.innerHTML = `<div class="error-message">Error al buscar. Por favor, intenta de nuevo.</div>`;
                responseCard.classList.add('show');
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = '<i class="bi bi-search"></i><span>Buscar</span>';
            }
        });

        // Format response as HTML
        function formatResponse(text) {
            if (!text) return '';
            
            // Convert markdown-like to HTML
            let html = text
                // Headers
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                // Lists
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
                // Tables (basic)
                .replace(/\|(.+)\|/g, (match) => {
                    const cells = match.split('|').filter(c => c.trim());
                    if (cells.some(c => c.includes('---'))) return '';
                    const tag = cells.some(c => c.trim().match(/^[-]+$/)) ? 'td' : 'td';
                    return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
                })
                // Line breaks
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            // Wrap lists
            html = html.replace(/(<li>.*<\/li>)+/g, '<ul>$&</ul>');
            
            // Wrap tables
            html = html.replace(/(<tr>.*<\/tr>)+/g, '<table>$&</table>');
            
            // Wrap in paragraph
            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }
            
            return html;
        }

        // Focus input on load
        window.addEventListener('load', () => {
            searchInput.focus();
        });
    </script>
</body>
</html>
